<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Complexity metrics — per-metric curves</title>
<style>
  body {
    font-family: "STIX Two Text", Charter, Georgia, "Times New Roman", serif;
    margin: 0; padding: 0; background: #ffffff; color: #141413;
  }
  .toggles {
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 12px; margin-bottom: 14px; padding-bottom: 12px;
    border-bottom: 1px solid #E3D8CC; max-width: 1040px;
  }
  .toggle { display: flex; align-items: center; gap: 8px; }
  .toggle-label {
    font-size: 13px; font-weight: 500; color: #6A6058;
    margin-right: 4px; letter-spacing: .3px;
  }
  .sw-track {
    display: inline-flex; align-items: stretch;
    background: #ECE3D7; border-radius: 8px; padding: 3px; gap: 3px;
    flex-wrap: wrap;
  }
  .sw-btn {
    padding: 6px 14px; border: none; border-radius: 5px;
    background: transparent; cursor: pointer;
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    color: #6A6058;
  }
  .sw-btn.active {
    background: #FFFFFF; color: #1A1210;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .figure-wrap {
    background: #FFFFFF; border: 1px solid #E3D8CC; border-radius: 10px;
    padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    max-width: 1040px; margin: 0 auto; text-align: center;
  }
  .figure-wrap img {
    width: 100%; height: auto; display: block;
  }
</style>
</head>
<body>
  <div class="toggles">
    <div class="toggle">
      <span class="toggle-label">Source</span>
      <div class="sw-track" id="src-track">
        <button class="sw-btn active" data-src="actrank">Activation</button>
        <button class="sw-btn"        data-src="fisher">Gradient</button>
      </div>
    </div>
    <div class="toggle">
      <span class="toggle-label">Metric</span>
      <div class="sw-track" id="metric-track"></div>
    </div>
  </div>

  <div class="figure-wrap"><img id="curves-fig"></div>

<script>
  const ACTRANK_METRICS = [
    ["rankme",              "RankMe (activation)"],
    ["participation_ratio", "Participation ratio (activation)"]
  ];
  const FISHER_METRICS = [
    ["log_trF",          "log tr F (gradient)"],
    ["r_eff",            "Participation ratio (gradient)"],
    ["rankme",           "RankMe (gradient)"],
    ["lambda1_over_trF", "λ₁ / tr F (gradient)"],
    ["mean_abs_cos",     "|cosine similarity| (gradient)"]
  ];
  const METRICS_BY_SRC = {actrank: ACTRANK_METRICS, fisher: FISHER_METRICS};
  let state = {src: "actrank", metric: ACTRANK_METRICS[0][0]};

  function renderMetricButtons() {
    const track = document.getElementById("metric-track");
    track.innerHTML = "";
    METRICS_BY_SRC[state.src].forEach(([k, label]) => {
      const b = document.createElement("button");
      b.className = "sw-btn" + (k === state.metric ? " active" : "");
      b.textContent = label;
      b.dataset.metric = k;
      b.addEventListener("click", () => {
        state.metric = k;
        update();
      });
      track.appendChild(b);
    });
  }

  function update() {
    document.getElementById("curves-fig").src =
        `img/metrics_curves_${state.src}_${state.metric}.png`;
    document.querySelectorAll("#src-track .sw-btn").forEach(b => {
      b.classList.toggle("active", b.dataset.src === state.src);
    });
    renderMetricButtons();
  }

  document.querySelectorAll("#src-track .sw-btn").forEach(b => {
    b.addEventListener("click", () => {
      state.src = b.dataset.src;
      state.metric = METRICS_BY_SRC[state.src][0][0];
      update();
    });
  });
  update();
</script>
</body>
</html>
