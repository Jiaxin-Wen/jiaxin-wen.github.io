<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipped Answer (Gold Labels) — main result</title>
<style>
  body {
    font-family: "STIX Two Text", Charter, Georgia, "Times New Roman", serif;
    margin: 0; padding: 28px 32px 48px; background: #FAF9F5; color: #141413;
  }
  h1 { font-size: 22px; font-weight: 400; margin: 0 0 4px; color: #B86046; }
  .subtitle { color: #555555; font-size: 13px; margin-bottom: 18px; }
  .toggles {
    display: flex; gap: 28px; flex-wrap: wrap;
    margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid #E3D8CC;
  }
  .toggle { display: flex; align-items: center; gap: 8px; }
  .toggle-label {
    font-size: 13px; font-weight: 500; color: #6A6058;
    margin-right: 4px; letter-spacing: .3px;
  }
  .sw-track {
    display: inline-flex; align-items: stretch;
    background: #ECE3D7; border-radius: 8px; padding: 3px; gap: 3px;
  }
  .sw-btn {
    padding: 6px 16px; border: none; border-radius: 5px;
    background: transparent; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 500;
    color: #6A6058;
  }
  .sw-btn.active {
    background: #FFFFFF; color: #1A1210;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .figure-wrap {
    background: #FFFFFF; border: 1px solid #E3D8CC; border-radius: 10px;
    padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
    max-width: 1040px; margin: 0 auto; text-align: center;
  }
  .figure-wrap img {
    width: 100%; height: auto; display: block;
  }
  .caption { font-size: 12px; color: #6A6058; margin-top: 10px; }
</style>
</head>
<body>
  <h1>Flipped Answer (Gold Labels)</h1>
  <div class="subtitle">Same 8 binary-classification tasks with ground-truth (non-flipped) demos · OLMo (top 2 rows) and Apertus (bottom 2 rows).</div>

  <div class="toggles">
    <div class="toggle">
      <span class="toggle-label">Y-axis</span>
      <div class="sw-track">
        <button class="sw-btn active" data-axis="y" data-val="hard_acc">Accuracy</button>
        <button class="sw-btn"        data-axis="y" data-val="soft_prob">Probability</button>
      </div>
    </div>
    <div class="toggle">
      <span class="toggle-label">X-axis</span>
      <div class="sw-track">
        <button class="sw-btn active" data-axis="x" data-val="tokens">Pretraining tokens</button>
        <button class="sw-btn"        data-axis="x" data-val="flops">FLOPs</button>
      </div>
    </div>
  </div>

  <div class="figure-wrap">
    <img id="fig" src="img/flipped_answer_gold_hard_acc_tokens.png">
  </div>
  <div class="caption" id="caption">Accuracy under gold (non-flipped) demos. Higher ⇒ predicts the true label.</div>

<script>
  const captions = {
    hard_acc:  "Accuracy under gold (non-flipped) demos. Higher ⇒ predicts the true label.",
    soft_prob: "P(true) − P(other). Positive ⇒ confident on the true label."
  };
  let state = { y: "hard_acc", x: "tokens" };
  function update() {
    document.getElementById("fig").src = `img/flipped_answer_gold_${state.y}_${state.x}.png`;
    document.getElementById("caption").textContent = captions[state.y];
    document.querySelectorAll(".sw-btn").forEach(btn => {
      btn.classList.toggle("active", state[btn.dataset.axis] === btn.dataset.val);
    });
  }
  document.querySelectorAll(".sw-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state[btn.dataset.axis] = btn.dataset.val;
      update();
    });
  });
  update();
</script>
</body>
</html>
